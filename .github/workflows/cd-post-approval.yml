# ═══════════════════════════════════════════════════════════
# WF5: cd-post-approval.yml — SCP Exception (v1)
# Called by ADO Service Hook when WI is approved.
# Creates PR in aws-organizations-terraform repo to
# add SCP exception.
# ═══════════════════════════════════════════════════════════
name: Post-Approval SCP Exception

on:
  repository_dispatch:
    types: [exemption-approved]

jobs:
  create-scp-exception:
    runs-on: ubuntu-latest
    # Phase 4 workflow — only triggered explicitly via repository_dispatch (ADO Service Hook).
    # Requires secrets: AWS_ROLE_ARN, ORG_REPO_TOKEN, ADO_PAT, ADO_ORG_URL, ADO_PROJECT.
    permissions:
      contents: read

    steps:
      - name: Parse inputs
        id: inputs
        run: |
          echo "work_item_id=${{ github.event.client_payload.work_item_id }}" >> $GITHUB_OUTPUT
          echo "checkov_rule_id=${{ github.event.client_payload.checkov_rule_id }}" >> $GITHUB_OUTPUT
          echo "resource_id=${{ github.event.client_payload.resource_id }}" >> $GITHUB_OUTPUT
          echo "target_env=${{ github.event.client_payload.target_env }}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.client_payload.pr_number }}" >> $GITHUB_OUTPUT

      - name: Checkout aws-organizations-terraform
        uses: actions/checkout@v4
        with:
          repository: org/aws-organizations-terraform
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Create SCP exception file
        run: |
          TARGET_ENV="${{ steps.inputs.outputs.target_env }}"
          RULE_ID="${{ steps.inputs.outputs.checkov_rule_id }}"
          WI_ID="${{ steps.inputs.outputs.work_item_id }}"
          RESOURCE_ID="${{ steps.inputs.outputs.resource_id }}"

          # TODO: Implement rule_id → SCP statement mapping
          # Create file in scps/exceptions/
          EXCEPTION_FILE="scps/exceptions/project-${RULE_ID}-WI${WI_ID}.json"

          echo "::warning::SCP exception creation not yet fully implemented"
          echo "Would create: $EXCEPTION_FILE"
          echo "For resource: $RESOURCE_ID in $TARGET_ENV"

      - name: Create PR in aws-organizations-terraform
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          WI_ID="${{ steps.inputs.outputs.work_item_id }}"
          RULE_ID="${{ steps.inputs.outputs.checkov_rule_id }}"

          # TODO: Implement branch creation + PR
          # git checkout -b "scp-exception/WI-${WI_ID}-${RULE_ID}"
          # git add scps/exceptions/
          # git commit -m "Add SCP exception for ${RULE_ID} (WI #${WI_ID})"
          # git push origin "scp-exception/WI-${WI_ID}-${RULE_ID}"
          # gh pr create --title "SCP Exception: ${RULE_ID}" --body "..."

          echo "::warning::PR creation not yet implemented"

      - name: Update ADO Work Item with SCP PR link
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
        run: |
          WI_ID="${{ steps.inputs.outputs.work_item_id }}"
          # TODO: PATCH ADO WI with link to SCP exception PR
          echo "::warning::ADO update not yet implemented"

      - name: Post comment on original PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.inputs.outputs.pr_number }}';
            const ruleId = '${{ steps.inputs.outputs.checkov_rule_id }}';
            const wiId = '${{ steps.inputs.outputs.work_item_id }}';

            // TODO: Include actual SCP PR link
            const body = `## ✅ Exemption Approved\n\n` +
              `**Rule:** \`${ruleId}\` | **WI:** #${wiId}\n\n` +
              `SCP exception PR will be created in aws-organizations-terraform.\n` +
              `Security Team approval required for the SCP change.`;

            // await github.rest.issues.createComment({
