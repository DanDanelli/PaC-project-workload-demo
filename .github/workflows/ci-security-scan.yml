# WF1: ci-security-scan.yml — Checkov Standalone Scan
# Barreira 2 da defesa em profundidade.
# ═══════════════════════════════════════════════════════════
name: Checkov Security Scan

on:
  pull_request:
    branches: [develop, non-prd, main]

env:
  CHECKOV_VERSION: '3.2.0'

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          repository: DanDanelli/cloud-policies-check
          path: policies

      - name: Detect environment level
        run: |
          BASE="${{ github.base_ref }}"
          case "$BASE" in
            develop) echo "CHECKOV_LEVEL=sandbox" >> $GITHUB_ENV ;;
            non-prd) echo "CHECKOV_LEVEL=non-prd" >> $GITHUB_ENV ;;
            main)    echo "CHECKOV_LEVEL=prd"     >> $GITHUB_ENV ;;
            *)       echo "CHECKOV_LEVEL=sandbox" >> $GITHUB_ENV ;;
          esac
          echo "Detected level: $CHECKOV_LEVEL for base branch: $BASE"

      - name: Install Checkov
        run: pip install checkov==${{ env.CHECKOV_VERSION }}

      - name: Run Checkov via wrapper
        id: checkov
        run: |
          chmod +x policies/scripts/run-checkov.sh
          policies/scripts/run-checkov.sh ./infra
        continue-on-error: true

      - name: Post PR comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔒 Checkov Security Scan\n\n';
            body += `**Environment level:** \`${process.env.CHECKOV_LEVEL}\`\n`;
            body += `**Status:** ${('${{ steps.checkov.outcome }}' === 'success') ? '✅ Passed' : '❌ Failed'}\n\n`;

            // TODO: Parse results_cli.txt for detailed summary
            body += '_Full results available in the workflow artifacts._';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-sarif
          path: results_sarif.sarif
          if-no-files-found: ignore

      - name: Fail if Checkov failed
        if: steps.checkov.outcome == 'failure'
        run: exit 1
